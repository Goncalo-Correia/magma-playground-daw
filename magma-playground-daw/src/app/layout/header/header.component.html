<div id="header" class="full-height full-width header-grid">
    <div id="header-project">
        <div ngbDropdown id="header-project-dropdown">
            <button ngbDropdownToggle>Project</button>
            <div ngbDropdownMenu aria-labelledby="headerProjectDropdown">
                <button ngbDropdownItem (click)="showNewProjectModal(content)">New +</button>
                <button ngbDropdownItem (click)="showEditProjectModal(content)">Edit</button>
                <button ngbDropdownItem (click)="showOpenProjectModal()">Open...</button>
                <button ngbDropdownItem (click)="showSaveProjectModal()">Save</button>
            </div>
        </div>
    </div>
</div>
<div id="header-modal">
    <div>
        <ng-template #content let-modal>
            <div class="modal-header" id="new-project-modal">
                <button type="button" class="close" aria-label="Close" (click)="closeModal()">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            <div class="modal-body">

            </div>
            <div class="modal-footer">
                
            </div>
        </ng-template>
    </div>
</div>
